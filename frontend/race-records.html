<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Records - My Strava Portfolio</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #ff5f6d, #3a1c71);
            color: white;
        }
        nav {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }
        .back-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            font-weight: bold;
            backdrop-filter: blur(10px);
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateX(-5px);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px;
        }
        h1 {
            text-align: center;
            font-size: 36px;
            margin-bottom: 40px;
        }
        .cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            width: 250px;
            transition: transform 0.3s, background 0.3s;
        }
        .card:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.2);
        }
        .card h3 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .card p {
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <nav>
        <a href="explore.html" class="back-btn">← Back</a>
    </nav>
    <div class="container">
        <h1>🏆 Race Records</h1>
        <div class="cards">
            <div class="card">
                <h3>5K</h3>
                <p>21:24</p>
            </div>
            <div class="card">
                <h3>10K</h3>
                <p>43:27</p>
            </div>
            <div class="card">
                <h3>Half Marathon</h3>
                <p>1:43:53</p>
            </div>
        </div>
    </div>
</body>
</html>
