<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Strava Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            background: radial-gradient(circle at right, #ff5f6d, #3a1c71);
            min-height: 100vh;
        }

        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 60px;
            padding: 60px 80px;
            height: 100vh;
            background: radial-gradient(circle at right, #ff5f6d, #3a1c71);
            color: white;
            position: relative;
            overflow: hidden;
        }

        /* Image container with blending effect */
        .hero-image-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .hero img {
            max-width: 100%;
            height: auto;
            max-height: 600px;
            width: auto;
            display: block;
            animation: slideInRight 0.9s ease-out, float 4s ease-in-out infinite;
            
            /* Smooth blending effect */
            -webkit-mask-image: radial-gradient(
                ellipse 80% 100% at 50% 50%,
                black 0%,
                black 60%,
                transparent 100%
            );
            mask-image: radial-gradient(
                ellipse 80% 100% at 50% 50%,
                black 0%,
                black 60%,
                transparent 100%
            );
            
            /* Alternative: gradient blend mode for softer edges */
            filter: drop-shadow(0 30px 60px rgba(0, 0, 0, 0.15));
        }

        /* Text content section */
        .hero-content {
            flex: 1;
            max-width: 550px;
            z-index: 5;
            animation: slideInLeft 0.9s ease-out;
        }

        .hero h1 {
            font-size: clamp(36px, 6vw, 56px);
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1.2;
        }

        .hero p {
            font-size: clamp(16px, 2.5vw, 20px);
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 0.5px;
            opacity: 0.95;
        }

        /* Button styling */
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .btn:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .btn:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(255, 95, 109, 0.3);
        }

        .btn:hover:before {
            left: 0;
        }

        /* Animations */
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(80px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-80px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-12px);
            }
        }

        /* Responsive design */
        @media (max-width: 1024px) {
            .hero {
                flex-direction: column;
                gap: 40px;
                padding: 60px 40px;
                justify-content: center;
            }

            .hero-content {
                max-width: 100%;
                text-align: center;
            }

            .hero-image-wrapper {
                width: 100%;
                max-width: 400px;
            }

            .hero img {
                max-height: 400px;
            }
        }

        @media (max-width: 768px) {
            .hero {
                padding: 40px 20px;
                height: auto;
                min-height: 100vh;
            }

            .hero h1 {
                font-size: clamp(28px, 5vw, 42px);
            }

            .hero p {
                font-size: clamp(14px, 2vw, 18px);
            }

            .btn {
                padding: 12px 28px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="hero-content">
            <h1>Nishanth P Kashyap</h1>
            <p>Final Year Student | Runner</p>
            <a href="explore.html" class="btn">Explore My Work</a>
        </div>
        <div class="hero-image-wrapper">
            <img src="media/my_image1.jpg" alt="Nishanth P Kashyap">
        </div>
    </div>
</body>
</html>
